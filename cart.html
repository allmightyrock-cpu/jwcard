<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>전시대봉사 일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef3f9;--surface:#fff;--surface2:#f4f8fc;--border:#ccdaeb;
  --navy:#1a4f8a;--navy-lt:#2565aa;--navy-dim:rgba(26,79,138,0.08);
  --text:#1a2b3c;--text-dim:#4a6480;--text-muted:#8faac0;
  --green:#1a9e72;--red:#d63b2b;--purple:#6b4fcf;--orange:#d97706;
  --shadow:0 2px 8px rgba(26,79,138,0.08);--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background-color:var(--bg);background-image:radial-gradient(circle,rgba(26,79,138,0.07) 1px,transparent 1px);background-size:22px 22px;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:linear-gradient(135deg,#1a4f8a,#2571c0);padding:14px 18px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;box-shadow:0 2px 12px rgba(26,79,138,0.25);}
.header-title{display:flex;align-items:center;gap:10px;}
.header-title-text{display:flex;flex-direction:column;gap:2px;}
.header-title-text strong{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#fff;}
.header-title-text span{font-size:11px;color:rgba(255,255,255,0.7);font-weight:400;}
.admin-badge{font-size:10px;background:rgba(255,255,255,0.22);color:#fff;padding:2px 7px;border-radius:20px;font-weight:600;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:90px;padding:12px 6px;text-align:center;font-size:12px;font-weight:500;
  color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700;}

/* LAYOUT */
main{padding:16px;max-width:600px;margin:0 auto;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:3px;height:13px;background:var(--navy);border-radius:2px;}

/* FORM */
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.form-row label{font-size:12px;color:var(--text-dim);min-width:44px;flex-shrink:0;}
select,input[type=number],input[type=text]{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;
  color:var(--text);padding:8px 10px;font-size:14px;
  font-family:'Noto Sans KR',sans-serif;outline:none;flex:1;-webkit-appearance:none;}
select:focus,input:focus{border-color:var(--navy);}
.num-inputs{display:flex;gap:6px;align-items:center;}
.num-inputs input{text-align:center;}
.num-inputs span{color:var(--text-muted);font-size:12px;flex-shrink:0;}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:none;
  transition:all .15s;white-space:nowrap;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-lt);}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text-dim);}
.btn-danger{background:#fff5f5;border:1.5px solid #f5c6c0;color:var(--red);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-full{width:100%;}
.btn:active{transform:scale(0.97);}

/* SCHEDULE CARD */
.schedule-card{background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer;
  transition:all .2s;box-shadow:var(--shadow);}
.schedule-card:hover{border-color:var(--navy);transform:translateY(-1px);}
.scard-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,var(--navy-dim),transparent);border-bottom:1px solid var(--border);}
.scard-date{font-family:'Noto Serif KR',serif;font-weight:700;font-size:15px;color:var(--navy);
  display:flex;align-items:center;gap:8px;}
.scard-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--navy-dim);color:var(--navy);}
.scard-body{padding:10px 14px;font-size:11px;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap;}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;}
.empty-state-icon{font-size:44px;margin-bottom:12px;}
.empty-state-text{font-size:14px;color:var(--text-muted);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:32px;color:var(--text-dim);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--navy);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,50,90,0.35);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;
  max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s;
  box-shadow:0 -8px 40px rgba(26,79,138,0.2);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-title{font-weight:700;font-size:14px;}
.modal-close{background:var(--surface2);border:none;color:var(--text-dim);
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;}

.member-list{overflow-y:auto;flex:1;}
.member-item{padding:12px 14px;cursor:pointer;font-size:14px;
  transition:background .1s;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);}
.member-item:hover{background:var(--navy-dim);}
.member-item.selected{background:#e8f2ff;color:var(--navy);font-weight:600;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;border-radius:30px;padding:10px 20px;
  font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;
  box-shadow:0 4px 16px rgba(26,79,138,0.35);}
#toast.show{transform:translateX(-50%) translateY(0);}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;position:relative;overflow:hidden;background:#1a3a5c;}
.login-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:blur(4px) brightness(0.5);transform:scale(1.05);}
.login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;}
.login-emblem{margin-bottom:16px;}
.login-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;
  color:#fff;margin-bottom:4px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.4);}
.login-sub{font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:32px;text-align:center;}
.login-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;
  padding:24px;width:100%;max-width:320px;box-shadow:0 8px 32px rgba(26,79,138,0.15);}
.login-label{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px;}
.login-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);padding:12px 14px;font-size:22px;
  font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:14px;
  letter-spacing:6px;text-align:center;}
.login-input:focus{border-color:var(--navy);}
.login-hint{font-size:11px;color:var(--text-muted);margin-bottom:14px;text-align:center;line-height:1.6;}
.login-error{font-size:12px;color:var(--red);margin-bottom:10px;text-align:center;min-height:18px;}

/* CUSTOM SELECT DROPDOWN */
.cw-sel-wrap{position:relative;width:100%;margin-bottom:14px;}
.cw-sel-trigger{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:9px;padding:11px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;
  color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  gap:8px;transition:border-color .15s;user-select:none;letter-spacing:0;}
.cw-sel-trigger:hover,.cw-sel-trigger.open{border-color:var(--navy);}
.cw-sel-trigger-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cw-sel-trigger-text.placeholder{color:var(--text-muted);}
.cw-sel-chevron{flex-shrink:0;transition:transform .2s;}
.cw-sel-trigger.open .cw-sel-chevron{transform:rotate(180deg);}
.cw-sel-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1.5px solid var(--navy);border-radius:10px;
  box-shadow:0 8px 24px rgba(26,79,138,0.15);z-index:200;
  max-height:220px;overflow-y:auto;display:none;}
.cw-sel-dropdown.open{display:block;}
.cw-sel-option{padding:10px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;
  color:var(--text);cursor:pointer;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid #f0f5fa;transition:background .1s;}
.cw-sel-option:last-child{border-bottom:none;}
.cw-sel-option:hover{background:var(--navy-dim);}
.cw-sel-option.selected{background:#eef4fb;font-weight:600;}
.cw-sel-option.placeholder-opt{color:var(--text-muted);}
.cw-shield{flex-shrink:0;display:flex;align-items:center;}

/* DETAIL BACK */
.detail-back{display:flex;align-items:center;gap:6px;color:var(--text-dim);
  font-size:13px;cursor:pointer;margin-bottom:14px;}
.detail-back:hover{color:var(--navy);}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;}
</style>
</head>

// ── FIREBASE ──
let db = null;
let _authReady = Promise.resolve();
try {
  const _cfg = (window.APP_CONFIG && window.APP_CONFIG.firebase) ? window.APP_CONFIG.firebase : null;
  if (_cfg) {
    if(!firebase.apps.length){ firebase.initializeApp(_cfg); }
    db = firebase.firestore();
    // ── 익명 인증 (Firestore 보안 규칙: request.auth != null 대응) ──
    _authReady = firebase.auth().signInAnonymously().catch(e => console.warn('익명 인증 실패:', e));
  } else { console.warn('⚠ config.js를 찾을 수 없습니다.'); }
} catch(e){ console.warn('Firebase:',e.message); }

// ── 정적 데이터 ──
const MEMBERS    = [];   // cartApproved 전도인 목록 (동적 로드)
const CONDUCTORS = [];   // MEMBERS와 동일 (동적 로드)
const LOCATIONS  = [];   // admin/cartConfig 에서 로드
const SCHEDULE_TYPES = [
  {id:"thu_pm",label:"목요일 저녁",emoji:"🌙",ds:{ap:"오후",h:7,m:"00"},de:{ap:"오후",h:9,m:"00"}},
  {id:"fri_pm",label:"금요일 저녁",emoji:"🌙",ds:{ap:"오후",h:7,m:"00"},de:{ap:"오후",h:9,m:"00"}},
  {id:"sat_pm",label:"토요일 오후",emoji:"🌤",ds:{ap:"오후",h:4,m:"00"},de:{ap:"오후",h:6,m:"00"}},
];
const TEAMS      = ["A","B","C","D","E","F"];
const TEAM_LABEL = {A:"A팀",B:"B팀",C:"C팀",D:"D팀",E:"E팀",F:"F팀"};
const WEEKDAYS   = ["월요일","화요일","수요일","목요일","금요일","토요일","일요일"];
const INTERVALS  = ScheduleTime.INTERVALS;  // 공유 모듈 (js/schedule-time.js)
const TC = {
  A:{bg:"#F0FDF8",ac:"#0D9367",border:"#6EE7C7",hdr:"#D1FAF0"},
  B:{bg:"#FFF1F3",ac:"#BE3257",border:"#FCA5B0",hdr:"#FFD7DE"},
  C:{bg:"#EFF6FF",ac:"#2563EB",border:"#93C5FD",hdr:"#BFDBFE"},
  D:{bg:"#FFFBEB",ac:"#B45309",border:"#FCD34D",hdr:"#FDE68A"},
  E:{bg:"#F5F3FF",ac:"#7C3AED",border:"#C4B5FD",hdr:"#EDE9FE"},
  F:{bg:"#FFF7F5",ac:"#C2410C",border:"#FCA185",hdr:"#FFE0D6"},
};
let ADMIN_PW  = null;    // Firestore admin/config.cartAdminPw — 개인 PIN 방식 전시대 암호
let _congregationName = '';  // Firestore admin/config.congregation
let _leaderAuthMode   = 'individual'; // 'individual' | 'shared'
let _sharedLeaderPin  = '';           // 공용 암호 방식일 때 사용

// ── 앱 초기 설정 로드 ──
async function _loadCartConfig() {
  if (!db) return;
  await _authReady;
  try {
    const snap = await db.collection('admin').doc('config').get();
    if (snap.exists) {
      const d = snap.data();
      ADMIN_PW = String(d.cartAdminPw || d.password || '');
      _congregationName = d.congregation || '';
    }
  } catch(e) { console.warn('설정 로드 오류:', e.message); }
  // ── 인도자 인증 방식 로드 ──
  try {
    const authSnap = await db.collection('config').doc('auth').get();
    console.log('[AUTH LOAD] config/auth exists:', authSnap.exists, '| raw data:', authSnap.exists ? JSON.stringify(authSnap.data()) : 'N/A');
    if (authSnap.exists) {
      const a = authSnap.data();
      _leaderAuthMode  = a.leaderAuthMode  || 'individual';
      _sharedLeaderPin = String(a.sharedLeaderPin || '');
      console.log('[AUTH LOAD] leaderAuthMode:', _leaderAuthMode, '| sharedLeaderPin:', _sharedLeaderPin ? '(set, len=' + _sharedLeaderPin.length + ')' : '(empty)');
    } else {
      console.warn('[AUTH LOAD] config/auth 문서가 없습니다 → individual 기본값 사용');
    }
  } catch(e) { console.warn('인증 설정 로드 오류:', e.message); }
  try {
    const locSnap = await db.collection('admin').doc('cartConfig').get();
    if (locSnap.exists) {
      const cd = locSnap.data();
      if (Array.isArray(cd.locations)) LOCATIONS.splice(0, LOCATIONS.length, ...cd.locations);
      if (Array.isArray(cd.scheduleTypes) && cd.scheduleTypes.length > 0) {
        SCHEDULE_TYPES.splice(0, SCHEDULE_TYPES.length, ...cd.scheduleTypes);
      }
    }
  } catch(e) { /* 무시 */ }
  // S.tab이 유효한 탭인지 확인 (__signup은 항상 유효)
  if (S.tab !== '__signup' && !SCHEDULE_TYPES.find(t => t.id === S.tab)) {
    S.tab = '__signup';
  }
  // cart 승인 전도인 목록 로드 (권한 포함)
  const _cartPubMap = {}; // name → {permission, ...}
  try {
    const pubSnap = await db.collection('publishers')
      .where('approved','==',true).get();
    pubSnap.docs.forEach(d => {
      const data = d.data();
      const role = data.cartRole || (data.cartApproved ? 'member' : null);
      if (data.name && role) _cartPubMap[data.name] = { ...data, _cartRole: role };
    });
    // 역할별 분리: 봉사자=모든 cart승인 전도인, 인도자=cartRole 'admin' 만
    const allNames = Object.keys(_cartPubMap).sort();
    const conductorNames = allNames.filter(n => _cartPubMap[n]._cartRole === 'admin');
    MEMBERS.splice(0, MEMBERS.length, ...allNames);
    CONDUCTORS.splice(0, CONDUCTORS.length, ...conductorNames);
    localStorage.removeItem('cw_members');
    localStorage.removeItem('cw_conductors');
  } catch(e) { console.warn('전도인 목록 로드 오류:', e.message); }

  // locations는 Firebase(admin/cartConfig.locations)에서 직접 로드됨 → localStorage 불필요
  // 혹시 구버전 localStorage에 cw_locations가 남아있으면 제거
  localStorage.removeItem("cw_locations");

// ── UTILS ──
function pad2(n){ return String(parseInt(n)||0).padStart(2,"0"); }
function fmt12h(str){ // "HH:MM" → "오전/오후 H:MM"
  const [h,m]=str.split(":").map(Number);
  const ap=h<12?"오전":"오후", h12=h===0?12:h>12?h-12:h;
  return `${ap} ${h12}:${String(m).padStart(2,"0")}`;
}
function calcTime(ap,h,m,n,idx){ return ScheduleTime.calcTime(ap,h,m,n,idx); }  // 공유 모듈
function toast(msg,ms=2400){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),ms);
}
function emptyTeams(){
  const t={};
  TEAMS.forEach(k=>{ t[k]={location:"",cartPerson:"",numSlots:2,rows:Array.from({length:6},()=>["","",""])}; });
  return t;
}
function rowsToObj(rows,ns){
  const obj={};
  Array.from({length:ns},(_,i)=>i).forEach(i=>{
    const r=rows[i]||["","",""];
    obj["r"+i]={s0:r[0]||"",s1:r[1]||"",s2:r[2]||""};
  });
  return obj;
}
function objToRows(obj,ns){
  if(!obj) return Array.from({length:ns},()=>["","",""]);
  if(Array.isArray(obj)) return Array.from({length:ns},(_,i)=>(obj[i]||["","",""]).slice(0,3));
  return Array.from({length:ns},(_,i)=>{
    const r=obj["r"+i]||{}; return [r.s0||"",r.s1||"",r.s2||""];
  });
}
function getCustomList(key){
  const def={members:[...MEMBERS],conductors:[...CONDUCTORS],locations:[...LOCATIONS]};
  try{ const v=localStorage.getItem("cw_"+key); return v?JSON.parse(v):[...def[key]]; }
  catch(e){ return [...(def[key]||[])]; }
}
function applyCustomLists(){
  // locations는 Firebase에서 관리 → 여기서 처리 안 함
  try{
    const m=localStorage.getItem("cw_members");
    const c=localStorage.getItem("cw_conductors");
    if(m) MEMBERS.splice(0,MEMBERS.length,...JSON.parse(m));
    if(c) CONDUCTORS.splice(0,CONDUCTORS.length,...JSON.parse(c));
  }catch(e){}
}
function getApplicants(id){
  if(!id) return [];
  const cached=S.schedules.find(x=>x.id===id);
  if(cached?.applicants?.length) return [...cached.applicants];
  if(S.selected?.id===id&&S.selected?.applicants?.length) return [...S.selected.applicants];
  try{ const v=localStorage.getItem("cw_ap_"+id); return v?JSON.parse(v):[]; }catch(e){return [];}
}
async function saveApplicants(id,list){
  localStorage.setItem("cw_ap_"+id,JSON.stringify(list));
  if(db&&id&&!id.startsWith("local_")){
    try{ await db.collection("cart_witnessing_schedules").doc(id).update({applicants:list}); }
    catch(e){ console.warn(e); }
  }
}
function getUsedMembers(excludeKey){
  const src=S.screen==="detail"?S.selected:S.form;
  if(!src) return new Set();
  const parts=(excludeKey||"").split(":");
  const [exK,exRi,exCi]=[parts[0],parseInt(parts[1]??-1),parseInt(parts[2]??-1)];
  const used=new Set();
  Object.entries(src.teams||{}).forEach(([k,t])=>{
    const ns=parseInt(t.numSlots)||2;
    objToRows(t.rows,ns).forEach((row,ri)=>{
      row.forEach((n,ci)=>{
        if(!n) return;
        if(k===exK&&ri===exRi&&ci===exCi) return;
        used.add(n);
      });
    });
  });
  return used;
}

// ── MODALS ──
function modalHTML(){
  if(!S.modal) return "";
  const parts=(S.modalTarget||"").split(":");
  const [k,ri,ci]=[parts[0],parseInt(parts[1]||0),parseInt(parts[2]||0)];
  const src=S.screen==="detail"?S.selected:S.form;
  const curName=src?.teams?.[k]?.rows?.[ri]?.[ci]||"";
  // curName이 객체형 rows일 수도 있으므로 objToRows로 변환
  const ns=parseInt(src?.teams?.[k]?.numSlots)||2;
  const resolvedRows=objToRows(src?.teams?.[k]?.rows,ns);
  const realCur=resolvedRows?.[ri]?.[ci]||"";
  const used=getUsedMembers(S.modalTarget);
  const scheduleId=S.selected?.id||"";
  const applicants=getApplicants(scheduleId);
  const q=S.search.toLowerCase();
  const avail=MEMBERS.filter(m=>!q||m.includes(q)).filter(m=>m===realCur||!used.has(m));
  const sec1=avail.filter(m=>applicants.includes(m));
  const sec2=avail.filter(m=>!applicants.includes(m));
  const renderItem=(m,isAp)=>{
    const sel=m===realCur;
    return `<div class="member-item${sel?" selected":""}" data-member="${m}" style="background:${isAp?"#f0fdf6":"#fff"};border-bottom:1px solid ${isAp?"#1a9e7218":"var(--border)"}">
      <div style="display:flex;align-items:center;gap:8px">
        ${isAp?`<span style="width:7px;height:7px;border-radius:50%;background:#1a9e72;flex-shrink:0;display:inline-block"></span>`:""}
        <span style="${isAp?"font-weight:600;color:#1a6b4a":"color:var(--text)"}">${m}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${isAp?`<span style="font-size:10px;font-weight:700;background:#1a9e72;color:#fff;padding:2px 8px;border-radius:20px">참여</span>`:""}
        ${sel?`<span style="font-size:14px;color:var(--navy);font-weight:700">✓</span>`:""}
      </div>
    </div>`;
  };
  let items="";
  if(sec1.length){
    items+=`<div style="padding:8px 14px;font-size:11px;font-weight:700;color:#1a9e72;background:#e8f9f3;display:flex;align-items:center;gap:6px">✋ 참여 등록자 <span style="background:#1a9e72;color:#fff;font-size:10px;padding:1px 7px;border-radius:20px">${sec1.length}명</span></div>`;
    items+=sec1.map(m=>renderItem(m,true)).join("");
  }
  if(sec2.length){

window.toggleCwSelect = function() {
  const trigger  = document.getElementById('lname-trigger');
  const dropdown = document.getElementById('lname-dropdown');
  if (!trigger || !dropdown) return;
  const isOpen = dropdown.classList.contains('open');
  dropdown.classList.toggle('open', !isOpen);
  trigger.classList.toggle('open', !isOpen);
};
window.selectCwName = function(el) {
  const val  = el.dataset.value || '';
  const nameEl    = document.getElementById('lname');
  const displayEl = document.getElementById('lname-display');
  const trigger   = document.getElementById('lname-trigger');
  const dropdown  = document.getElementById('lname-dropdown');
  if (!nameEl || !displayEl) return;

  // 선택 상태 표시
  document.querySelectorAll('.cw-sel-option').forEach(o => o.classList.remove('selected'));
  if (val) el.classList.add('selected');

  nameEl.value = val;
  displayEl.textContent = val || '이름을 선택하세요';
  displayEl.className = 'cw-sel-trigger-text' + (val ? '' : ' placeholder');
  dropdown.classList.remove('open');
  trigger.classList.remove('open');

  // 이름 변경 이벤트 발화
  nameEl.dispatchEvent(new Event('change'));
};

function bindLogin(){
  const nameEl = document.getElementById('lname');
  const err    = document.getElementById('lerr');

  // 이름 변경 시 에러 초기화
  nameEl.onchange = () => { err.textContent = ''; };

  // 인도자로 입장: 이름이 CONDUCTORS에 있으면 바로 admin 모드 진입
  document.getElementById('lbtn').onclick = () => {
    const name = nameEl.value;
    err.textContent = '';
    if (!name) { err.textContent = '이름을 선택해 주세요.'; return; }
    if (!CONDUCTORS.includes(name)) {
      err.textContent = '인도자로 등록된 이름이 아닙니다. 전시대 봉사 신청은 구역카드 앱에서 이용하세요.';
      return;
    }
    S.role = 'admin'; S.screen = 'list';
    localStorage.setItem('cw_myname', name);
    loadData();
    loadCartNotice();
  };

  // 자동 선택: publisher.html / 이전 세션에서 저장된 이름
  const _saved = localStorage.getItem('jwcard_name') || localStorage.getItem('cw_myname');
  if (_saved) {
    const opt = document.querySelector(`.cw-sel-option[data-value="${_saved}"]`);
    if (opt) selectCwName(opt);
  }
  setTimeout(() => document.getElementById('lname-trigger')?.focus(), 80);
}

function _cwApHmTo24(ap,h,m){ return ScheduleTime.apHmTo24(ap,h,m); }

function _cwBuildWeekSessions(){
  const monday=_cwWeekMonday();
  const wkStr=ScheduleTime.weekKey(monday);
  const DOW_KO=["일","월","화","수","목","금","토"];
  const now=new Date();
  const sessions=[];
  SCHEDULE_TYPES.forEach(t=>{
    const dow=_cwSchedTypeToDow(t); if(dow<0) return;
    const st=_cwApHmTo24(t.ds?.ap,t.ds?.h,t.ds?.m);
    const et=_cwApHmTo24(t.de?.ap,t.de?.h,t.de?.m);
    // 일요일(0)은 +6 → 해당 주의 마지막 날(일요일). 다음 주로 넘기지 않음
    const daysFromMon=dow===0?6:dow-1;
    const dt=new Date(monday); dt.setDate(monday.getDate()+daysFromMon); dt.setHours(st.h,st.m,0,0);
    const dtEnd=new Date(monday); dtEnd.setDate(monday.getDate()+daysFromMon); dtEnd.setHours(et.h,et.m,0,0);
    const pad=n=>String(n).padStart(2,"0");
    sessions.push({
      key:wkStr+"_"+t.id,typeId:t.id,
      label:t.label||(DOW_KO[dow]+"요일"),emoji:t.emoji||"",
      dateLabel:`${dt.getMonth()+1}월 ${dt.getDate()}일 (${DOW_KO[dow]})`,
      startStr:pad(st.h)+":"+pad(st.m),endStr:pad(et.h)+":"+pad(et.m),
      dt,dtEnd,ended:now>=dtEnd,wkStr
    });
  });
  sessions.sort((a,b)=>a.dt-b.dt);
  return {sessions,wkStr};
}

function _loadWeekSignups(){
  const {sessions,wkStr}=_cwBuildWeekSessions();
  _weekSessions=sessions;
  if(_weekSignupListener){_weekSignupListener();_weekSignupListener=null;}
  if(!sessions.length){render();return;}
  _weekSignupListener=db.collection("cartSessions").where("weekKey","==",wkStr)
    .onSnapshot(snap=>{
      _weekSignupData={};
      snap.forEach(d=>{_weekSignupData[d.id]=d.data();});
      if(S.tab==="__signup"&&S.screen==="list") render();
    },err=>console.warn("signups load:",err.message));
}

    const statusBadge=confirmed
      ?`<span class="scard-badge" style="background:#DCFCE7;color:#166534">✅ 팀 확정</span>`

  const sd=_weekSignupData[sessionKey]||{};

  _seSessionInfo=s;
  const saved=sd.teams||{};
  _seTeams=[];
  const teamKeys=Object.keys(saved);
  if(teamKeys.length){
    teamKeys.forEach((k,i)=>{
      const t=saved[k];
      const ns=parseInt(t.numSlots)||2;
      const rows=Array.from({length:ns},(_,ri)=>Array.isArray(t.rows)?[...(t.rows[ri]||["","",""])]:["","",""]);
      _seTeams.push({id:i,loc:t.loc||LOCATIONS[0]||"",numSlots:ns,rows,cartPerson:t.cartPerson||""});

    _seTeams=[{id:0,loc:LOCATIONS[0]||"",numSlots:2,rows:Array.from({length:6},()=>["","",""]),cartPerson:""}];

function _closeSignupEditor(){
  const el=document.getElementById("_se_overlay"); if(el) el.remove();
}
function _seBlurAll(){
  // 모바일 키보드 방지: innerHTML 재빌드 후 포커스 강제 해제
  setTimeout(()=>{ if(document.activeElement?.blur) document.activeElement.blur(); },30);
}

function _seAddTeam(){
  _seTeams.push({id:_seTeams.length,loc:LOCATIONS[0]||"",numSlots:2,rows:Array.from({length:6},()=>["","",""]),cartPerson:""});
  _renderSignupEditor();
}

function _seDelTeam(idx){
  _seTeams.splice(idx,1);
  _seTeams.forEach((t,i)=>t.id=i);
  _renderSignupEditor();
}

function _seSetSlots(ti,ns){_seTeams[ti].numSlots=ns;_renderSignupEditor();}
function _seSetLoc(ti,v){_seTeams[ti].loc=v;}
function _seSetCart(ti,v){_seTeams[ti].cartPerson=v;}

function _seClearCell(ti,si,ci){
  if(!_seTeams[ti]) return;
  _seTeams[ti].rows[si][ci]="";
  _renderSignupEditor();
}

function _seOpenPicker(ti,si,ci){
  // 키보드/포커스 강제 해제 (모바일에서 키보드 올라오는 현상 방지)
  if(document.activeElement && typeof document.activeElement.blur==="function"){
    document.activeElement.blur();
  }
  _sePicker={ti,si,ci};
  const allUsed=new Set();
  _seTeams.forEach(t=>t.rows.slice(0,t.numSlots).forEach(r=>r.forEach(n=>{if(n)allUsed.add(n);})));
  const sd=_weekSignupData[_seSessionKey]||{};
  const signups=sd.signups||[];
  const pickerEl=document.getElementById("_se_picker");
  const namesEl=document.getElementById("_se_picker_names");
  if(!pickerEl||!namesEl) return;
  namesEl.innerHTML=signups.map(m=>{
    const used=allUsed.has(m);
    return `<button ontouchend="event.preventDefault();${used?"":"_sePickMember('"+m+"')"}" onclick="${used?"":"_sePickMember('"+m+"')"}" ${used?"disabled":""} style="padding:11px 20px;border-radius:24px;font-size:14px;font-weight:600;border:2px solid ${used?"#E2E8F0":"#BFDBFE"};background:${used?"#F8FAFC":"#EFF6FF"};color:${used?"#CBD5E1":"#1D4ED8"};cursor:${used?"not-allowed":"pointer"};font-family:inherit;opacity:${used?".4":"1"};-webkit-tap-highlight-color:transparent">${m}</button>`;
  }).join("");
  pickerEl.style.display="flex";
}

function _seClosePicker(){
  const el=document.getElementById("_se_picker"); if(el) el.style.display="none";
  _sePicker=null;
}

function _sePickMember(name){
  if(!_sePicker) return;
  const {ti,si,ci}=_sePicker;
  if(_seTeams[ti]) _seTeams[ti].rows[si][ci]=name;
  _seClosePicker();
  _renderSignupEditor();
}

async function _seConfirm(){
  const wkStr=_seSessionKey.substring(0,8);
  const typeId=_seSessionKey.substring(9);
  const teamsData={};
  _seTeams.forEach((t,i)=>{
    const k=["A","B","C","D"][i]||String(i);
    teamsData[k]={loc:t.loc,numSlots:t.numSlots,cartPerson:t.cartPerson,rows:t.rows.slice(0,t.numSlots)};
  });
  try{
    const ref=db.collection("cartSessions").doc(_seSessionKey);
    const snap=await ref.get();
    if(snap.exists()){
      await ref.update({teams:teamsData,confirmed:true});
    } else {
      await ref.set({weekKey:wkStr,typeId,signups:[],confirmed:true,teams:teamsData,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    toast("팀이 확정되었습니다");
    _closeSignupEditor();
  }catch(e){toast("저장 실패: "+e.message);}
}

function buildMemberItems(){
  const parts=(S.modalTarget||"").split(":");
  const [k,ri,ci]=[parts[0],parseInt(parts[1]||0),parseInt(parts[2]||0)];
  const src=S.screen==="detail"?S.selected:S.form;
  const ns=parseInt(src?.teams?.[k]?.numSlots)||2;
  const rows=objToRows(src?.teams?.[k]?.rows,ns);
  const realCur=rows?.[ri]?.[ci]||"";
  const used=getUsedMembers(S.modalTarget);
  // 이번 주 신청자만 표시 (cartSessions 기반)
  const session=_weekSessions.find(s=>s.typeId===S.tab);
  const sd=session?(_weekSignupData[session.key]||{}):{};
  let signups=sd.signups||[];
  // 신청자 없으면 구형 참여자 목록으로 폴백
  if(!signups.length) signups=getApplicants(S.selected?.id||"");
  const avail=signups.filter(m=>m===realCur||!used.has(m));
  const ri2=m=>{
    const sel=m===realCur;
    return `<div class="member-item${sel?" selected":""}" data-member="${m}"
      style="background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:15px;font-weight:${sel?"700":"500"};color:${sel?"var(--navy)":"var(--text)"}">
        ${m}
      </span>
      ${sel?`<span style="font-size:16px;color:var(--navy);font-weight:700">✓</span>`:""}
    </div>`;
  };
  if(!avail.length) return `<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px">이번 주 신청자가 없습니다</div>`;
  return avail.map(ri2).join("");
}

// ── 30일 이전 완료 데이터 자동 정리 (인도자 전용) ──
async function _autoCleanOldCartData() {
  if (!db || S.role !== 'admin') return;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().slice(0, 10);   // "YYYY-MM-DD"
  const cutoffWk  = cutoffStr.replace(/-/g, '');         // "YYYYMMDD"
  try {
    // ① cart_witnessing_schedules: 완료 처리 + 30일 이전
    const schedSnap = await db.collection('cart_witnessing_schedules')
      .where('completed', '==', true)
      .where('date', '<', cutoffStr)
      .get();
    const b1 = db.batch();
    schedSnap.docs.forEach(d => b1.delete(d.ref));
    if (schedSnap.size > 0) await b1.commit();

    // ② cartSessions: weekKey 기준 30일 이전 (팀 신청·확정 기록)
    const sessSnap = await db.collection('cartSessions')
      .where('weekKey', '<', cutoffWk)
      .get();
    const b2 = db.batch();
    sessSnap.docs.forEach(d => b2.delete(d.ref));
    if (sessSnap.size > 0) await b2.commit();

    const total = schedSnap.size + sessSnap.size;
    if (total > 0) {
      console.log(`[자동정리] 30일 이전 전시대 데이터 ${total}건 삭제`);
      toast(`🗑 30일 이전 완료 데이터 ${total}건 자동 정리됨`, 3000);
      // 로컬 상태에서도 제거
      const deletedIds = new Set(schedSnap.docs.map(d => d.id));
      S.schedules = S.schedules.filter(s => !deletedIds.has(s.id));
      localStorage.setItem('cw_schedules', JSON.stringify(S.schedules));
      render();
    }
  } catch (e) {
    console.warn('[자동정리] 삭제 오류:', e.message);
  }
}

async function _openThisWeekSchedule(typeId){
  const session=_weekSessions.find(s=>s.typeId===typeId);
  S.tab=typeId;
  if(!session){S.screen="list";render();return;}
  const dt=session.dt;
  const month=String(dt.getMonth()+1);
  const day=String(dt.getDate());
  // 이번 주 날짜와 일치하는 미완료 명단 검색
  const match=S.schedules.find(s=>
    s.type===typeId&&String(s.month)===month&&String(s.day)===day&&!s.completed
  );
  if(match){S.selected=match;S.screen="detail";render();return;}

  // ▶ 이번 주 명단 없음 → config 기준으로 자동 생성 후 상세로 바로 진입
  const ti=SCHEDULE_TYPES.find(t=>t.id===typeId)||SCHEDULE_TYPES[0];
  const DOW_KO=["일","월","화","수","목","금","토"];
  const mm=month.padStart(2,"0"), dd=day.padStart(2,"0");
  // 빈 팀 구조 (numSlots=2, 6행 빈 배열 → rows 객체로 변환)
  const cleanTeams={};
  TEAMS.forEach(k=>{
    const emptyRows=Array.from({length:2},()=>["","",""]);
    cleanTeams[k]={location:"",cartPerson:"",numSlots:2,
      rows:rowsToObj(emptyRows,2),members:[]};
  });
  const autoData={
    type:typeId,
    month:parseInt(month),day:parseInt(day),
    weekday:DOW_KO[dt.getDay()]+"요일",
    startAmPm:ti.ds.ap, startHour:parseInt(ti.ds.h),
    startMin:String(ti.ds.m||0).padStart(2,"0"),
    endAmPm:ti.de.ap,   endHour:parseInt(ti.de.h),
    endMin:String(ti.de.m||0).padStart(2,"0"),
    conductor:"",numTeams:1,teams:cleanTeams,
    date:dt.getFullYear()+"-"+mm+"-"+dd,  // dt 기준 연도 사용 (연말 주간 연도 오류 방지)
    completed:false,
    updatedAt:db?firebase.firestore.FieldValue.serverTimestamp():new Date().toISOString()
  };
  try{
    let id="local_"+Date.now();
    if(db){
      const ref=await db.collection("cart_witnessing_schedules").add(
        {...autoData,createdAt:firebase.firestore.FieldValue.serverTimestamp()}
      );
      id=ref.id;
    }
    const newDoc={id,...autoData};
    S.schedules.unshift(newDoc);
    S.selected=newDoc;
    localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
    toast("📋 이번 주 일정이 자동 생성됐습니다",2200);
    S.screen="detail";
  }catch(e){
    // 자동 생성 실패 시 기존 폼 방식으로 fallback
    toast("자동 생성 실패: "+e.message);
    S.form={type:typeId,month,day,weekday:DOW_KO[dt.getDay()]+"요일",
      startAmPm:ti.ds.ap,startHour:ti.ds.h,startMin:ti.ds.m,
      endAmPm:ti.de.ap,endHour:ti.de.h,endMin:ti.de.m,
      conductor:"",numTeams:1,teams:emptyTeams()};
    S.prevScreen="list";S.screen="create";
  }
  render();
}

function syncForm(){

  sv("type","ftype",true);sv("month","fmonth");sv("day","fday");sv("weekday","fwkd",true);
  sv("startAmPm","fsap",true);sv("startHour","fsh",true);sv("startMin","fsm",true);
  sv("endAmPm","feap",true);sv("endHour","feh",true);sv("endMin","fem",true);
  sv("conductor","fcond",true);
  TEAMS.forEach(k=>{
    if(!S.form.teams[k]) S.form.teams[k]=emptyTeams()[k];
    const loc=g("floc"+k);if(loc!==null) S.form.teams[k].location=loc;
    const cart=g("fcart"+k);if(cart!==null) S.form.teams[k].cartPerson=cart;

async function saveSchedule(){
  syncForm();
  const f=S.form;
  if(!f.month||!f.day){toast("날짜를 입력해 주세요");return;}
  if(!f.startHour){toast("시작 시간을 입력해 주세요");return;}
  const mm=String(f.month).padStart(2,"0"),dd=String(f.day).padStart(2,"0");
  const cleanTeams={};
  TEAMS.forEach(k=>{
    const t=f.teams[k]||{};
    const ns=parseInt(t.numSlots)||2;
    const rows=objToRows(t.rows,ns);
    cleanTeams[k]={location:t.location||"",cartPerson:t.cartPerson||"",numSlots:ns,rows:rowsToObj(rows,ns),members:rows.flat().filter(Boolean)};
  });
  const data={type:f.type,month:parseInt(f.month),day:parseInt(f.day),weekday:f.weekday,
    startAmPm:f.startAmPm,startHour:parseInt(f.startHour),startMin:f.startMin||"00",
    endAmPm:f.endAmPm,endHour:parseInt(f.endHour),endMin:f.endMin||"00",
    conductor:f.conductor,numTeams:parseInt(f.numTeams),teams:cleanTeams,
    date:new Date().getFullYear()+"-"+mm+"-"+dd,completed:false,
    updatedAt:db?firebase.firestore.FieldValue.serverTimestamp():new Date().toISOString()};
  const btn=document.getElementById("fsave");
  if(btn){btn.disabled=true;btn.textContent="저장 중...";}
  try{
    if(S.screen==="edit"&&f.id){
      if(db) await db.collection("cart_witnessing_schedules").doc(f.id).set(data,{merge:true});
      S.selected={id:f.id,...data};
      const idx=S.schedules.findIndex(x=>x.id===f.id);
      if(idx>=0) S.schedules[idx]={id:f.id,...data};
      toast("✅ 수정되었습니다");S.screen="detail";
    }else{
      let id="local_"+Date.now();
      if(db){const ref=await db.collection("cart_witnessing_schedules").add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});id=ref.id;}
      const newDoc={id,...data};S.schedules.unshift(newDoc);S.selected=newDoc;
      toast("✅ 명단이 등록되었습니다");S.screen="detail";
    }
    localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
    S.form=null;render();
  }catch(e){
    toast("저장 실패: "+e.message);
    if(btn){btn.disabled=false;btn.textContent="💾 저장";}
  }
}

      const t=S.selected.teams[k]||{};
      const ns=parseInt(t.numSlots)||2;
      const rows=objToRows(t.rows,ns);
      cleanTeams[k]={...t,rows:rowsToObj(rows,ns),members:rows.flat().filter(Boolean)};
    });
    await db.collection("cart_witnessing_schedules").doc(S.selected.id).update({teams:cleanTeams});
    S.selected.teams=cleanTeams;
    const idx=S.schedules.findIndex(x=>x.id===S.selected.id);
    if(idx>=0) S.schedules[idx]={...S.selected};
    localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
  }catch(e){toast("저장 실패: "+e.message);}
}

async function deleteSchedule(){
  if(!confirm("이 명단을 삭제하시겠습니까?")) return;
  const id=S.form?.id||S.selected?.id;if(!id) return;
  await deleteById(id);
  S.screen="list";S.form=null;S.selected=null;render();
}
async function deleteById(id){
  if(db&&!id.startsWith("local_")){try{await db.collection("cart_witnessing_schedules").doc(id).delete();}catch(e){toast("삭제 실패: "+e.message);return;}}
  S.schedules=S.schedules.filter(s=>s.id!==id);
  localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
  toast("삭제되었습니다");render();
}
async function markCompleted(id){
  const idx=S.schedules.findIndex(x=>x.id===id);if(idx<0)return;
  S.schedules[idx].completed=true;
  localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
  if(db&&!id.startsWith("local_")){try{await db.collection("cart_witnessing_schedules").doc(id).update({completed:true});}catch(e){console.warn(e);}}
  toast("✅ 완료 처리되었습니다");render();
}
async function restoreSchedule(id){
  const idx=S.schedules.findIndex(x=>x.id===id);if(idx<0)return;
  S.schedules[idx].completed=false;
  localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
  if(db&&!id.startsWith("local_")){try{await db.collection("cart_witnessing_schedules").doc(id).update({completed:false});}catch(e){console.warn(e);}}
  toast("↩️ 복원되었습니다");render();
}
function copySchedule(id){
  const src=S.schedules.find(x=>x.id===id);if(!src)return;
  const teams={};
  TEAMS.forEach(k=>{const t=src.teams?.[k]||{};const ns=parseInt(t.numSlots)||2;teams[k]={location:t.location||"",cartPerson:"",numSlots:ns,rows:Array.from({length:ns},()=>["","",""])};});
  S.form={...src,id:undefined,month:"",day:"",weekday:"월요일",conductor:"",teams,applicants:[],completed:false};
  S.prevScreen="list";S.screen="create";toast("📋 복사됨 — 날짜를 입력해 주세요");render();
}
async function deleteAllCompleted(){
  const ids=S.schedules.filter(s=>s.completed&&s.type===S.tab).map(s=>s.id);
  for(const id of ids){if(db&&!id.startsWith("local_")){try{await db.collection("cart_witnessing_schedules").doc(id).delete();}catch(e){console.warn(e);}}}
  S.schedules=S.schedules.filter(s=>!(s.completed&&s.type===S.tab));
  localStorage.setItem("cw_schedules",JSON.stringify(S.schedules));
  toast("✅ "+ids.length+"건 삭제되었습니다");S.showCompleted=false;render();
}
function logout(){S.screen="login";S.role=null;S.selected=null;S.form=null;S.modal=false;render();}

async function moveScheduleType(idx,dir){
  const ni=idx+dir;
  if(ni<0||ni>=SCHEDULE_TYPES.length) return;
  [SCHEDULE_TYPES[idx],SCHEDULE_TYPES[ni]]=[SCHEDULE_TYPES[ni],SCHEDULE_TYPES[idx]];
  await saveScheduleTypes();
}
async function addScheduleType(){
  const label=(document.getElementById("st-sch-label")?.value||"").trim();
  if(!label){toast("요일명을 입력해 주세요");return;}
  const emoji=document.getElementById("st-sch-emoji")?.value||"📅";
  const sap=document.getElementById("st-sch-sap")?.value||"오후";
  const sh=parseInt(document.getElementById("st-sch-sh")?.value)||7;
  const sm=document.getElementById("st-sch-sm")?.value||"00";
  const eap=document.getElementById("st-sch-eap")?.value||"오후";
  const eh=parseInt(document.getElementById("st-sch-eh")?.value)||9;
  const em=document.getElementById("st-sch-em")?.value||"00";
  const id="sch_"+Date.now();
  SCHEDULE_TYPES.push({id,label,emoji,ds:{ap:sap,h:sh,m:sm},de:{ap:eap,h:eh,m:em}});
  await saveScheduleTypes("✅ 봉사 요일이 추가되었습니다");
}
async function deleteScheduleType(idx){
  if(SCHEDULE_TYPES.length<=1){toast("최소 1개는 유지해야 합니다");return;}
  const t=SCHEDULE_TYPES[idx];
  if(!t) return;
  if(!confirm('"'+t.label+'" 요일을 삭제할까요?')) return;
  const deletedId=t.id;
  SCHEDULE_TYPES.splice(idx,1);
  if(S.tab===deletedId) S.tab=SCHEDULE_TYPES[0]?.id||"";
  await saveScheduleTypes("삭제되었습니다");
}
async function saveScheduleTypeEdit(idx){
  const t=SCHEDULE_TYPES[idx]; if(!t) return;
  const sap=document.getElementById("ste-sap")?.value||t.ds.ap;
  const sh=parseInt(document.getElementById("ste-sh")?.value)||t.ds.h;
  const sm=document.getElementById("ste-sm")?.value||String(t.ds.m);
  const eap=document.getElementById("ste-eap")?.value||t.de.ap;
  const eh=parseInt(document.getElementById("ste-eh")?.value)||t.de.h;
  const em=document.getElementById("ste-em")?.value||String(t.de.m);
  SCHEDULE_TYPES[idx]={...t, ds:{ap:sap,h:sh,m:sm}, de:{ap:eap,h:eh,m:em}};
  _stEditIdx=null;
  await saveScheduleTypes("✅ 시간이 수정되었습니다");
}
async function saveScheduleTypes(msg){
  if(db){
    try{
      await db.collection("admin").doc("cartConfig").set({scheduleTypes:SCHEDULE_TYPES},{merge:true});
    }catch(e){console.warn("봉사 요일 저장 오류:",e.message);toast("저장 오류: "+e.message);return;}
  }
  render();
  if(msg) toast(msg);
}
// 장소 목록을 Firebase에 저장 (봉사 요일과 동일한 방식)
async function saveLocations(msg){
  if(db){
    try{
      await db.collection("admin").doc("cartConfig").set({locations:LOCATIONS},{merge:true});
    }catch(e){console.warn("장소 저장 오류:",e.message);toast("저장 오류: "+e.message);return;}
  }
  localStorage.removeItem("cw_locations"); // 구버전 localStorage 데이터 제거
  render();
  if(msg) toast(msg);
}
function saveListItem(tab,val){
  // 장소 목록은 Firebase에 저장 (localStorage가 아님)
  if(tab==="locations"){
    if(LOCATIONS.includes(val)){toast("이미 있는 항목입니다");return;}
    LOCATIONS.push(val);
    saveLocations("✅ 추가되었습니다");
    return;
  }
  const cur=getCustomList(tab);
  if(cur.includes(val)){toast("이미 있는 항목입니다");return;}
  cur.push(val);localStorage.setItem("cw_"+tab,JSON.stringify(cur));
  applyCustomLists();render();toast("✅ 추가되었습니다");
}
function deleteListItem(tab,idx){
  // 장소 목록은 Firebase에서 삭제
  if(tab==="locations"){
    LOCATIONS.splice(idx,1);
    saveLocations("삭제되었습니다");
    return;
  }
  const cur=getCustomList(tab);cur.splice(idx,1);
  localStorage.setItem("cw_"+tab,JSON.stringify(cur));
  applyCustomLists();render();toast("삭제되었습니다");
}

async function shareSchedule(){
  const el=document.querySelector("main");if(!el){toast("공유할 내용이 없습니다");return;}
  const s=S.selected;
  const filename="전시대명단_"+(s?.month||"")+"월"+(s?.day||"")+"일.png";
  toast("이미지 생성 중...",3000);

  // 공유 이미지에는 명단 내용만 담는다 — 버튼/뒤로가기 등 조작 UI는 잠시 숨김
  const hidden=[];
  el.querySelectorAll("#dback,#dshare,#dedit,#dapply").forEach(n=>{
    hidden.push([n,n.style.display]);n.style.display="none";
  });

  let canvas;
  try{
    // width/height 를 전체 콘텐츠 크기로 명시해 화면 밖 영역까지 빠짐없이 캡처
    canvas=await html2canvas(el,{
      scale:2,useCORS:true,backgroundColor:"#eef3f9",
      width:el.scrollWidth,height:el.scrollHeight,
      windowWidth:el.scrollWidth,windowHeight:el.scrollHeight,
      scrollX:0,scrollY:0
    });
  }catch(e){toast("이미지 생성 실패: "+e.message);return;}
  finally{hidden.forEach(([n,d])=>{n.style.display=d;});}

  const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
  const file=blob?new File([blob],filename,{type:"image/png"}):null;

  // ── 1순위: 실제 사진 파일 공유 (모바일) ──
  // 세로로 긴 명단도 잘리지 않고 사진 그대로 전송된다.
  // (카카오 '피드' 카드는 이미지를 가로 배너 비율로 잘라내므로 사용하지 않는다)
  if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"전시대 봉사 명단"});return;}
    catch(e){if(e.name==="AbortError")return;}
  }

  // ── 2순위: 이미지 다운로드 (PC 등 파일 공유 미지원 환경) ──
  // 전체 명단이 담긴 이미지를 저장한 뒤 카카오톡 대화창에 직접 첨부.
  downloadImg(canvas.toDataURL("image/png"),filename);
  toast("✅ 이미지를 저장했습니다. 카카오톡 대화창에 첨부해 보내세요.",4000);
}
function downloadImg(dataUrl,filename){
  const a=document.createElement("a");a.href=dataUrl;a.download=filename;a.click();
}

// ── SW 업데이트 감지 ──
(function _initSWUpdate() {
  if (!('serviceWorker' in navigator)) return;

  function showUpdateBanner() {
    if (document.getElementById('sw-update-banner')) return;
    const b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:9999',
      'background:#1B3A6B', 'color:#fff',
      'padding:12px 16px', 'display:flex', 'align-items:center',
      'justify-content:space-between', 'gap:12px',
      'font-size:14px', 'font-family:"Noto Sans KR",sans-serif',
      'box-shadow:0 2px 16px rgba(0,0,0,0.35)'
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전이 업데이트됐습니다</span>' +
      '<button onclick="location.reload()" style="background:#fff;color:#1B3A6B;' +
      'border:none;border-radius:8px;padding:7px 16px;font-size:13px;' +
      'font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">지금 업데이트</button>';
    document.body.appendChild(b);
  }

  // 새 SW가 대기 중 → 즉시 활성화 요청 → controllerchange 발생
  function activateWaiting(reg) {
    if (reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  }

  // controllerchange : 새 SW가 실제로 페이지를 제어하기 시작한 순간
  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return;
    reloading = true;
    showUpdateBanner();   // 배너 표시 (사용자가 버튼 누르면 reload)
  });

  navigator.serviceWorker.ready.then(reg => {
    // 이미 대기 중인 새 버전 있으면 즉시 활성화 시도
    if (reg.waiting) {
      activateWaiting(reg);
      showUpdateBanner();
    }
    // 앞으로 새 SW 설치 감지
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          // 새 버전 설치 완료 & 기존 컨트롤러 존재 → 업데이트 가능
          activateWaiting(reg);
          showUpdateBanner();
        }
      });
    });
  });

  // 백그라운드에서 30분마다 SW 업데이트 체크 (탭 열어 놓고 있을 때)
  setInterval(() => {
    navigator.serviceWorker.ready.then(reg => reg.update()).catch(() => {});
  }, 30 * 60 * 1000);
})();

// ── 봉사자 선택 모달 이벤트 (한 번만 바인딩) ──
function _bindModalItems(){
  document.querySelectorAll("#mlist .member-item").forEach(el=>
    el.addEventListener("click",()=>pickMember(el.dataset.member))
  );
}
function _initModalOnce(){
  document.getElementById("movl")?.addEventListener("click",e=>{
    if(e.target.id==="movl") closeModal();
  });
  document.getElementById("mclose")?.addEventListener("click",closeModal);
  // 모달이 열릴 때 배경 스크롤 방지
  document.getElementById("movl")?.addEventListener("transitionstart",e=>{
    if(e.target.id==="movl" && document.getElementById("movl").classList.contains("open"))
      document.body.style.overflow="hidden";
  });
  document.getElementById("movl")?.addEventListener("transitionend",e=>{
    if(e.target.id==="movl" && !document.getElementById("movl").classList.contains("open"))
      document.body.style.overflow="";
  });
}

// ── INIT ──
applyCustomLists();
_initModalOnce();
render();
