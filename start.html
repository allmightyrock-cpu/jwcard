<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>전자구역카드 설치 시작</title>
<style>
  :root{
    --navy:#1B3A6B; --blue:#2563EB; --sky:#EFF6FF; --green:#166534; --green-bg:#F0FDF4;
    --amber:#92400E; --amber-bg:#FFFBEB; --red:#B91C1C; --red-bg:#FEF2F2;
    --ink:#1E293B; --muted:#64748B; --line:#E2E8F0; --soft:#F8FAFC;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#EEF2F7;color:var(--ink);line-height:1.7;-webkit-text-size-adjust:100%}
  .page{max-width:920px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(15,23,42,.07)}
  header{background:linear-gradient(135deg,var(--navy),#2E5A9E);color:#fff;padding:34px 28px 28px}
  header .eyebrow{font-size:13px;opacity:.82;margin-bottom:5px}
  h1{font-size:27px;line-height:1.25;margin:0 0 8px;font-weight:700;letter-spacing:0}
  header p{margin:0;font-size:14px;opacity:.92}
  main{padding:24px 28px 64px}
  nav.quick{display:flex;gap:8px;flex-wrap:wrap;background:var(--soft);border-bottom:1px solid var(--line);padding:14px 28px}
  nav.quick a{font-size:13px;text-decoration:none;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px}
  h2{font-size:20px;color:var(--navy);font-weight:650;margin:28px 0 10px;display:flex;align-items:center;gap:8px;scroll-margin-top:16px}
  h3{font-size:15px;color:#334155;font-weight:650;margin:18px 0 8px}
  p,li{font-size:14px}
  a{color:#1D4ED8}
  code{background:#EEF2FF;color:#1E3A8A;border-radius:5px;padding:1px 6px;font-family:Consolas,ui-monospace,monospace;font-size:12.5px}
  .lead{font-size:14.5px;color:#475569}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:12px 0}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .card b{color:var(--navy);font-weight:650}
  .step{display:grid;grid-template-columns:38px 1fr;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;margin:11px 0}
  .num{width:32px;height:32px;border-radius:10px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:650}
  .step-title{font-size:15px;font-weight:650;color:var(--navy);margin-bottom:4px}
  .step-body{font-size:14px;color:#475569}
  .toolbox{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin:14px 0}
  .tool{border:1px solid #BFDBFE;background:#EFF6FF;border-radius:13px;padding:14px;text-decoration:none;color:var(--ink)}
  .tool strong{display:block;color:var(--navy);font-weight:650;margin-bottom:3px}
  .note{border-radius:11px;padding:12px 14px;margin:12px 0;font-size:13.5px}
  .note.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
  .note.warn{background:var(--amber-bg);border:1px solid #FDE68A;color:var(--amber)}
  .note.danger{background:var(--red-bg);border:1px solid #FECACA;color:var(--red)}
  .note.ok{background:var(--green-bg);border:1px solid #BBF7D0;color:var(--green)}
  .codeblock{background:#0F172A;color:#E2E8F0;border-radius:11px;padding:13px 15px;font-family:Consolas,ui-monospace,monospace;font-size:12.5px;overflow:auto;line-height:1.65;margin:10px 0;white-space:pre}
  details{border:1px solid var(--line);border-radius:12px;background:#fff;margin:9px 0;overflow:hidden}
  summary{cursor:pointer;list-style:none;padding:13px 15px;font-size:14px;font-weight:650;color:var(--navy)}
  summary::-webkit-details-marker{display:none}
  .answer{border-top:1px solid var(--line);padding:13px 15px;color:#475569}
  .links{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .btn{display:inline-block;text-decoration:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:650}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  footer{border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;text-align:center;padding:22px 28px 34px}
  @media(max-width:640px){header{padding:28px 20px 24px}main{padding:18px 18px 52px}nav.quick{padding:12px 18px}.step{grid-template-columns:1fr}.num{margin-bottom:2px}h1{font-size:23px}}
  @media print{body{background:#fff}.page{box-shadow:none;max-width:none}nav.quick,.links .btn,footer{display:none}.step,.card,.note,details{break-inside:avoid}header{background:var(--navy)!important;print-color-adjust:exact;-webkit-print-color-adjust:exact}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">설치 시작 페이지</div>
    <h1>설치는 install-guide.html에서 진행합니다</h1>
    <p>기존 start.html의 내용은 공식 설치 안내서로 통합되었습니다. 아래 버튼으로 설치 안내서를 열어 주세요.</p>
  </header>
  <main>
    <section>
      <h2>바로가기</h2>
      <div class="toolbox">
        <a class="tool" href="install-guide.html"><strong>📖 공식 설치 안내서</strong>처음부터 끝까지 따라가는 중심 문서입니다.</a>
        <a class="tool" href="setup.html"><strong>⚙️ config.js 생성 도우미</strong>설치 중 설정 파일을 만들 때 사용합니다.</a>
        <a class="tool" href="diagnostics.html"><strong>🩺 설치 점검 도구</strong>배포 후 연결 상태를 확인합니다.</a>
      </div>
      <div class="note info">이 페이지는 기존 링크가 깨지지 않도록 남겨 둔 시작 페이지입니다. 실제 설치 설명은 <code>install-guide.html</code>에 통합되어 있습니다.</div>
    </section>
  </main>
</div>
</body>
</html>
