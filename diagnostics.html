<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>전자구역카드 — 설치 점검(자동 진단)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<style>
  :root{ --navy:#1B3A6B; --blue:#2563eb; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;color:#0f172a;line-height:1.6}
  .top{background:linear-gradient(135deg,#1B3A6B,#2563eb);color:#fff;padding:24px 20px}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:19px;margin:0 0 4px;font-weight:800}
  .top .sub{font-size:13px;opacity:.9;margin:0}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
  .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-main{background:var(--navy);color:#fff}
  .btn-ghost{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
  .item{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
  .ic{font-size:20px;line-height:1.2;flex-shrink:0;width:24px;text-align:center}
  .it-body{flex:1;min-width:0}
  .it-title{font-size:14px;font-weight:800;margin-bottom:2px}
  .it-msg{font-size:12.5px;color:#475569}
  .it-fix{font-size:12px;margin-top:6px}
  .it-fix a{color:var(--blue);font-weight:700;text-decoration:none}
  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
  .b-ok{background:#dcfce7;color:#166534} .b-warn{background:#fef3c7;color:#92400e}
  .b-bad{background:#fee2e2;color:#b91c1c} .b-run{background:#e0e7ff;color:#3730a3}
  .links{font-size:12.5px;color:#64748b;margin-top:18px;text-align:center;line-height:2}
  .links a{color:var(--blue);font-weight:600;text-decoration:none;margin:0 8px}
  #report{width:100%;min-height:120px;margin-top:10px;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;display:none;background:#f8fafc}
</style>
</head>
<body>
<div class="top">
  <div class="wrap" style="padding-bottom:0">
    <h1>🩺 설치 점검 (자동 진단)</h1>
    <p class="sub">버튼을 누르면 설정·연결 상태를 자동으로 검사하고, 문제가 있으면 해결 방법을 알려드립니다.</p>
  </div>
</div>

<div class="wrap">
  <div class="btnrow">
    <button id="run" class="btn btn-main">▶ 점검 시작</button>
    <button id="copy" class="btn btn-ghost" style="display:none">📋 결과 복사(문의용)</button>
  </div>

  <div id="list">
    <div class="item"><div class="ic">①</div><div class="it-body"><div class="it-title">점검을 시작하려면 위 버튼을 누르세요.</div><div class="it-msg">설치 직후 또는 문제가 생겼을 때 실행하면 됩니다.</div></div></div>
  </div>

  <textarea id="report" readonly></textarea>

  <div class="links">
    <a href="/setup.html">⚙️ 간편 설치 도우미</a> ·
    <a href="/faq.html">❓ 자주 묻는 질문</a> ·
    <a href="/install-guide.html">📖 설치 안내서</a>
  </div>
</div>

<script>
// ── 진단 결과 저장 (문의 리포트용) ──
var DIAG = {};
function setItem(key, title, state, msg, fix){
  DIAG[key] = { title:title, state:state, msg:msg||'' };
  var icons = { run:'⏳', ok:'✅', warn:'⚠️', bad:'❌' };
  var badges = { run:'<span class="badge b-run">검사중</span>', ok:'<span class="badge b-ok">정상</span>', warn:'<span class="badge b-warn">확인필요</span>', bad:'<span class="badge b-bad">문제</span>' };
  var el = document.getElementById('it-'+key);
  if (!el){
    el = document.createElement('div'); el.className='item'; el.id='it-'+key;
    document.getElementById('list').appendChild(el);
  }
  el.innerHTML = '<div class="ic">'+icons[state]+'</div><div class="it-body">'+
    '<div class="it-title">'+title+badges[state]+'</div>'+
    '<div class="it-msg">'+(msg||'')+'</div>'+
    (fix ? '<div class="it-fix">'+fix+'</div>' : '')+
    '</div>';
}

function ph(v){ return !v || /^YOUR_/i.test(String(v)) || String(v).trim()===''; }

// ── 1. 설정 파일(config.js) ──
function checkConfig(){
  var c = window.APP_CONFIG, fb = c && c.firebase;
  if (!fb || ph(fb.apiKey) || ph(fb.projectId)){
    setItem('config','설정 파일(config.js)','bad','Firebase 설정이 비어 있거나 예시값(YOUR_…) 그대로입니다.',
      '<a href="/setup.html">간편 설치 도우미</a>로 config.js를 만들어 적용하세요.');
    return false;
  }
  setItem('config','설정 파일(config.js)','ok','프로젝트: '+fb.projectId);
  return true;
}

// ── 4. 카카오(선택) ──
function checkKakao(){
  var k = window.APP_CONFIG && window.APP_CONFIG.kakaoJsKey;
  if (ph(k)) setItem('kakao','카카오톡 공유(선택)','warn','카카오 키가 없습니다. 공유는 이미지 저장 방식으로 대체됩니다. (선택 기능)');
  else setItem('kakao','카카오톡 공유(선택)','ok','카카오 키가 설정되어 있습니다.');
}

// ── 5. PWA / 서비스워커 ──
function checkPWA(){
  if (!('serviceWorker' in navigator)){ setItem('pwa','앱 설치(PWA)','warn','이 브라우저는 서비스워커를 지원하지 않습니다.'); return; }
  navigator.serviceWorker.getRegistrations().then(function(regs){
    if (regs && regs.length) setItem('pwa','앱 설치(PWA)','ok','서비스워커 등록됨 — 홈 화면 추가 및 오프라인 사용 가능.');
    else setItem('pwa','앱 설치(PWA)','warn','서비스워커가 아직 등록되지 않았습니다. publisher.html을 한 번 열면 등록됩니다.');
  }).catch(function(){ setItem('pwa','앱 설치(PWA)','warn','서비스워커 상태를 확인할 수 없습니다.'); });
}

// ── 6. 버전 ──
function checkVersion(){
  fetch('/version.json?_=' + Date.now()).then(function(r){ return r.ok ? r.json() : null; })
    .then(function(j){ setItem('version','앱 버전','ok', j && j.v ? ('v' + j.v + (j.updated ? ' · ' + j.updated : '')) : '버전 정보 확인'); })
    .catch(function(){ setItem('version','앱 버전','warn','version.json을 불러오지 못했습니다.'); });
}

// ── 3. 네이버 지도 (핵심: 인증 실패/지오코딩 자동 판별) ──
window.navermap_authFailure = function(){
  setItem('naver','네이버 지도','bad','네이버 인증 실패 — 키가 잘못됐거나, 배포 도메인이 등록되지 않았습니다.',
    'NCP 콘솔 → Maps 애플리케이션 → <b>Web 서비스 URL</b>에 현재 배포 주소(<code>'+location.origin+'</code>)를 등록하세요. <a href="/faq.html#naver">자세히</a>');
};
function checkNaver(){
  var key = window.APP_CONFIG && window.APP_CONFIG.naverClientId;
  if (ph(key)){ setItem('naver','네이버 지도','warn','config.js에 네이버 키가 없습니다. (관리자 설정에만 넣은 경우 이 페이지에선 검사되지 않습니다)','<a href="/setup.html">설치 도우미</a>에서 네이버 Client ID를 넣어보세요.'); return; }
  setItem('naver','네이버 지도','run','지도 SDK 로딩 중…');
  var done = false;
  var s = document.createElement('script');
  s.src = 'https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + encodeURIComponent(key) + '&submodules=geocoder';
  s.onerror = function(){ if(done) return; done=true; setItem('naver','네이버 지도','bad','지도 SDK를 불러오지 못했습니다 (네트워크 또는 키 오류).'); };
  s.onload = function(){
    setTimeout(function(){
      if (done) return; // authFailure가 이미 처리
      if (!window.naver || !naver.maps){ done=true; setItem('naver','네이버 지도','bad','지도 객체가 생성되지 않았습니다. 키/도메인을 확인하세요.'); return; }
      if (!naver.maps.Service){ done=true; setItem('naver','네이버 지도','warn','지도는 로드됐지만 Geocoder가 없습니다. 위치 변환이 안 될 수 있습니다.'); return; }
      // 샘플 주소 지오코딩 → Geocoding API 활성화 여부 판별
      naver.maps.Service.geocode({ query: '서울특별시청' }, function(status, res){
        if (done) return; done=true;
        if (status === naver.maps.Service.Status.ERROR){
          setItem('naver','네이버 지도','bad','지도는 뜨지만 <b>주소→좌표 변환(Geocoding)이 실패</b>합니다.',
            'NCP 콘솔에서 해당 애플리케이션에 <b>Geocoding</b> API가 이용 신청/활성화됐는지 확인하세요. <a href="/faq.html#naver">자세히</a>');
        } else {
          setItem('naver','네이버 지도','ok','지도·주소 변환 모두 정상입니다.');
        }
      });
    }, 2500); // navermap_authFailure가 먼저 호출될 시간 확보
  };
  document.head.appendChild(s);
}

// ── 2. Firebase 연결 (모듈) ──
function startModuleChecks(){
  if (!checkConfig()) { setItem('firebase','Firebase 연결','bad','config.js 문제로 연결을 검사할 수 없습니다.'); afterChecks(); return; }
  setItem('firebase','Firebase 연결','run','연결 시도 중…');
  var m = document.createElement('script');
  m.type = 'module';
  m.textContent = [
    "import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';",
    "import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';",
    "import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';",
    "(async()=>{ try{",
    "  const app = initializeApp(window.APP_CONFIG.firebase);",
    "  await signInAnonymously(getAuth(app));",
    "  const db = getFirestore(app);",
    "  await getDoc(doc(db,'admin','config'));",
    "  window.__fbResult = {ok:true};",
    "}catch(e){ window.__fbResult = {ok:false, msg:(e&&e.code)||(e&&e.message)||String(e)}; } })();"
  ].join(' ');
  document.head.appendChild(m);
  var tries = 0;
  var iv = setInterval(function(){
    tries++;
    if (window.__fbResult){
      clearInterval(iv);
      if (window.__fbResult.ok) setItem('firebase','Firebase 연결','ok','익명 인증 + 데이터 읽기 성공.');
      else {
        var c = window.__fbResult.msg || '';
        var hint = /permission|insufficient/i.test(c)
          ? 'Firestore 보안 규칙에서 인증 사용자 읽기를 허용했는지 확인하세요 (request.auth != null).'
          : /auth|configuration|api-key|invalid/i.test(c)
          ? 'Firebase 익명 로그인 활성화 / config.js 키를 확인하세요.'
          : '네트워크 또는 Firebase 설정을 확인하세요.';
        setItem('firebase','Firebase 연결','bad','연결 실패: ' + c, hint + ' <a href="/faq.html#firebase">자세히</a>');
      }
      afterChecks();
    } else if (tries > 40){ clearInterval(iv); setItem('firebase','Firebase 연결','warn','응답이 없습니다(시간 초과). 네트워크를 확인하세요.'); afterChecks(); }
  }, 250);
}

var _afterDone = false;
function afterChecks(){ if(_afterDone) return; _afterDone = true; document.getElementById('copy').style.display = ''; }

document.getElementById('run').addEventListener('click', function(){
  _afterDone = false; DIAG = {}; document.getElementById('list').innerHTML = '';
  document.getElementById('report').style.display = 'none';
  checkConfig(); checkKakao(); checkPWA(); checkVersion(); checkNaver(); startModuleChecks();
});

document.getElementById('copy').addEventListener('click', function(){
  var lines = ['[전자구역카드 설치 점검 결과]'];
  var stMap = { ok:'정상', warn:'확인필요', bad:'문제', run:'검사중' };
  Object.keys(DIAG).forEach(function(k){ var d=DIAG[k]; lines.push('- '+d.title+': '+(stMap[d.state]||d.state)+(d.msg?(' — '+d.msg.replace(/<[^>]+>/g,'')):'')); });
  lines.push('');
  lines.push('주소: ' + location.origin);
  lines.push('브라우저: ' + navigator.userAgent);
  lines.push('시각: ' + new Date().toLocaleString('ko-KR'));
  var text = lines.join(String.fromCharCode(10));
  var ta = document.getElementById('report');
  ta.value = text; ta.style.display = 'block';
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(function(){ var b=document.getElementById('copy'); b.textContent='✅ 복사됨 (담당자에게 붙여넣기)'; setTimeout(function(){b.textContent='📋 결과 복사(문의용)';},2000); }).catch(function(){ ta.select(); });
  else { ta.select(); }
});
</script>
</body>
</html>
